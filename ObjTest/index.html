<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自我客体化测试 - 探索真实自我</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800&swap"
    rel="stylesheet">

  <!-- Shared UI -->
  <link rel="stylesheet" href="../shared/test-ui.css?v=20260417f">
  <link rel="stylesheet" href="../shared/auth.css">
  <link rel="stylesheet" href="../shared/comments.css?v=20260417f">
</head>

<body class="landing-active">
  <canvas id="particles-canvas"></canvas>
  <div id="auth-status"></div>

  <!-- 返回主页按钮 -->
  <a href="../index.html" class="nav-home-btn" id="globalHomeBtn" title="返回主页">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
      <polyline points="9 22 9 12 15 12 15 22" />
    </svg>
  </a>

  <!-- 1. Landing Page -->
  <section id="landing" class="page active">
    <div class="landing-content">
      <div class="logo-glow"></div>
      <h1 class="title-main">
        <span class="title-line2">自我客体化测评</span>
      </h1>
      <p class="subtitle">评估你在多大程度上将自己当作物品或工具</p>
      <div class="intro-cards">
        <div class="intro-card">
          <div class="intro-icon">🔒</div>
          <p>一共40道题</p>
        </div>
        <div class="intro-card">
          <div class="intro-icon">🕯️</div>
          <p>评估主体认知</p>
        </div>
        <div class="intro-card">
          <div class="intro-icon">⚡</div>
          <p id="objtest-participant-count">加载中...</p>
        </div>
      </div>
      <div class="action-buttons-wrapper">
        <button id="start-btn" class="btn-primary" onclick="startTest()">
          <span>开始探索之旅</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7" />
          </svg>
        </button>
      </div>
      <p class="disclaimer">本测评可作为自我探索之用，不能替代专业诊断。</p>
    </div>
  </section>

  <!-- 2. Quiz Page -->
  <section id="quiz" class="page">
    <div class="quiz-header">
      <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-text">
        <span id="current-q">1</span> / <span id="total-q">40</span>
      </div>
    </div>
    <div class="quiz-body">
      <div id="question-container" class="question-container"></div>
    </div>
    <div class="quiz-footer">
      <button class="btn-secondary" onclick="prevQuestion()">上一题</button>
      <button class="btn-primary" onclick="nextQuestion()">下一题</button>
    </div>
  </section>

  <!-- 3. Loading Page -->
  <section id="loading" class="page">
    <div class="loading-content">
      <div class="loading-orb">
        <div class="orb-ring"></div>
        <div class="orb-ring"></div>
        <div class="orb-ring"></div>
        <div class="orb-core"></div>
      </div>
      <h2 class="loading-title">正在解构主体认知...</h2>
    </div>
  </section>

  <!-- 4. Result Page -->
  <!-- 4. Result Page -->
  <section id="result" class="page">
    <div id="result-display" style="width: 100%; max-width: 700px; margin: 0 auto;"></div>
    
    <div class="result-actions" style="margin-top: 30px;">
      <button class="btn-share" onclick="shareResult()">
        <span>生成分享海报</span>
      </button>
      <button class="btn-primary" onclick="restartTest()">
        <span>重新测试</span>
      </button>
    </div>

    <!-- 作者说明底部（复刻 SoulLab 设计） -->
    <div class="author-divider"
      style="margin: 35px auto 25px auto; width: 100%; max-width: 700px; height: 2px; background: linear-gradient(90deg, transparent 5%, var(--accent-1) 50%, transparent 95%); box-shadow: 0 0 15px var(--accent-1), 0 0 5px rgba(255, 255, 255, 0.3); opacity: 0.8;">
    </div>
    <div class="author-credit"
      style="display: flex; justify-content: space-between; align-items: center; text-align: left; padding: 0 5px; max-width: 700px; margin: 0 auto 40px auto; width: 100%; box-sizing: border-box;">
      <div style="flex: 1;">
        <p class="author-info" style="margin: 0; line-height: 1.8; font-size: 0.9rem;">
          作者：<span class="author-name">青野</span><br>
          公众号：<a
            href="https://mp.weixin.qq.com/mp/profile_ext?action=home&__biz=MzI1ODA1OTMxMQ==&subscene=0#wechat_redirect"
            target="_blank" rel="noopener noreferrer" class="author-link">觉醒诗社 <svg width="14" height="14"
              viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle;">
              <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6" />
              <polyline points="15 3 21 3 21 9" />
              <line x1="10" y1="14" x2="21" y2="3" />
            </svg></a>
        </p>
      </div>
      <div style="margin-left: 20px; text-align: center; display: flex; flex-direction: column; align-items: center;">
        <img src="../SoulLab/images/qrcode.png" alt="扫码测试"
          style="width: 80px; height: 80px; object-fit: contain; border-radius: 8px; border: 2px solid rgba(255,255,255,0.15); background: white; padding: 3px; margin-bottom: 0;">
        <span
          style="font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-top: 6px; white-space: nowrap;">扫码测试灵格</span>
      </div>
    </div>

    <div class="result-comments-shell">
      <div id="comments-section" data-page="objtest"></div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../shared/supabase-config.js"></script>
  <script src="../shared/auth.js?v=20260417f"></script>
  <script src="../shared/comments.js?v=20260417f"></script>
  <script src="questions.js"></script>
  <script src="results.js"></script>
  <script src="../shared/test-app.js?v=20260417f"></script>
</body>

</html>
