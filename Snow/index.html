<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 漫天飞雪</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background-color: #000;
            font-family: 'Microsoft YaHei', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas {
            display: block;
            touch-action: none;
            position: fixed;
            top: 0; left: 0;
        }

        /* ── 底部按钮栏 ── */
        #bottom-bar {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 14px;
            z-index: 200;
            align-items: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #bottom-bar.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(16px);
            pointer-events: none;
        }

        /* 统一圆形按钮（返回 & 设置） */
        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(10, 10, 30, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: rgba(255, 255, 255, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }

        .icon-btn:hover,
        .icon-btn:active {
            background: rgba(30, 30, 60, 0.75);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ── 设置面板 ── */
        #ui-panel {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) scale(1);
            transform-origin: bottom center;
            width: 300px;
            max-width: calc(100vw - 32px);
            background: rgba(10, 10, 30, 0.82);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: rgba(255, 255, 255, 0.9);
            padding: 18px 20px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            transition: opacity 0.25s ease, transform 0.25s ease;
            z-index: 150;
        }

        #ui-panel.collapsed {
            opacity: 0;
            transform: translateX(-50%) scale(0.92) translateY(12px);
            pointer-events: none;
        }

        #ui-panel h1 {
            margin: 0 0 14px 0;
            font-size: 14px;
            color: rgba(180, 200, 255, 0.9);
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            letter-spacing: 0.05em;
        }

        .control-group {
            margin-bottom: 10px;
        }

        label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #7b9cff;
        }

        input[type="color"] {
            width: 100%;
            height: 28px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
        }

        input[type="checkbox"] {
            cursor: pointer;
            accent-color: #7b9cff;
        }

        hr.panel-divider {
            border: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin: 10px 0;
        }

        .instructions {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 8px;
        }

        .instructions ul {
            padding-left: 16px;
            margin: 0;
        }

        .instructions li {
            margin-bottom: 3px;
        }
    </style>
</head>

<body>
    <canvas id="snowCanvas"></canvas>

    <!-- 设置面板（默认收起） -->
    <div id="ui-panel" class="collapsed">
        <h1>❄️ 3D 雪景控制台</h1>

        <div class="control-group">
            <label>背景颜色</label>
            <input type="color" id="bgColor" value="#87CEEB">
        </div>
        <div class="control-group">
            <label>背景深浅</label>
            <input type="range" id="bgDarkness" min="0" max="1" step="0.05" value="0.2">
        </div>

        <hr class="panel-divider">

        <div class="control-group">
            <label>雪花密度 <span id="val-density">600</span></label>
            <input type="range" id="density" min="100" max="4000" step="50" value="600">
        </div>
        <div class="control-group">
            <label>下落速度 <span id="val-speed">1.0</span></label>
            <input type="range" id="speed" min="0.1" max="10" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label>雪花大小 <span id="val-size">1.0</span></label>
            <input type="range" id="size" min="0.1" max="5" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label>风力 <span id="val-wind">0.5</span></label>
            <input type="range" id="wind" min="-10" max="10" step="0.1" value="0.5">
        </div>
        <div class="control-group">
            <label style="align-items: center;">
                <span>风向随机性</span>
                <input type="checkbox" id="windChaos" style="width: auto; margin: 0;">
            </label>
        </div>

        <div class="instructions">
            <ul>
                <li>🖱️ 任意拖拽旋转视角</li>
                <li>📱 全屏触摸自由旋转</li>
                <li>❄️ 晶体 + 颗粒混合雪花</li>
            </ul>
        </div>
    </div>

    <!-- 底部按钮栏 -->
    <div id="bottom-bar">
        <!-- 返回主页 -->
        <a href="../index.html" class="icon-btn" title="返回主页">
            <svg viewBox="0 0 24 24">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
        </a>
        <!-- 设置 -->
        <button id="toggle-btn" class="icon-btn" title="设置">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="3" />
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
        </button>
    </div>

    <script>
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);

        const CONFIG = {
            particleCount: isMobile ? 300 : 600,
            baseSpeed: 1,
            baseSize: 1,
            baseWind: 0.5,
            windChaos: false,
            fov: 800,
            bgColor: '#87CEEB',
            bgDarkness: 0.2
        };

        let width, height, particles = [], textures = [];
        let angleX = 0, angleY = 0, isDragging = false, lastX = 0, lastY = 0;

        // ── 设置面板开关 ──
        const panel = document.getElementById('ui-panel');
        const toggleBtn = document.getElementById('toggle-btn');
        const bottomBar = document.getElementById('bottom-bar');

        // 自动隐藏底部按钮栏
        let hideTimer = null;
        function showBar() {
            bottomBar.classList.remove('hidden');
            clearTimeout(hideTimer);
            hideTimer = setTimeout(() => {
                // 面板展开时不隐藏
                if (panel.classList.contains('collapsed')) {
                    bottomBar.classList.add('hidden');
                }
            }, 3000);
        }
        // 初始显示 3 秒后隐藏
        showBar();

        // 鼠标移动 / 触摸 → 显示按钮栏
        document.addEventListener('mousemove', showBar);
        document.addEventListener('touchstart', showBar, { passive: true });

        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            panel.classList.toggle('collapsed');
            // 面板展开时保持按钮栏可见
            if (!panel.classList.contains('collapsed')) {
                clearTimeout(hideTimer);
                bottomBar.classList.remove('hidden');
            } else {
                showBar();
            }
        });

        // 点击面板外任意区域收起面板（移动端友好）
        document.addEventListener('click', (e) => {
            if (!panel.classList.contains('collapsed') &&
                !panel.contains(e.target) &&
                e.target !== toggleBtn) {
                panel.classList.add('collapsed');
            }
        });

        // 面板内点击不冒泡
        panel.addEventListener('click', (e) => e.stopPropagation());

        // ── 雪花纹理生成 ──
        function createSnowflakeTexture() {
            const size = 64, c = document.createElement('canvas');
            c.width = c.height = size;
            const tCtx = c.getContext('2d'), center = size / 2;
            tCtx.strokeStyle = 'rgba(255, 255, 255, 0.95)';
            tCtx.lineWidth = 2;
            tCtx.lineCap = 'round';
            tCtx.shadowBlur = 4;
            tCtx.shadowColor = 'rgba(255, 255, 255, 0.6)';
            tCtx.translate(center, center);

            const branches = 6, radius = size / 2 - 4, irregularity = Math.random();
            for (let i = 0; i < branches; i++) {
                tCtx.save();
                tCtx.rotate((Math.PI * 2 / branches) * i + (Math.random() - 0.5) * irregularity * 0.5);
                const branchLen = radius * (0.7 + Math.random() * 0.3);
                tCtx.beginPath();
                tCtx.moveTo(0, 0);
                tCtx.lineTo(0, -branchLen);
                tCtx.stroke();
                const subBranches = Math.floor(Math.random() * 4) + 1;
                for (let j = 0; j < subBranches; j++) {
                    const dist = (j + 1) / (subBranches + 1) * branchLen;
                    const subLen = (branchLen - dist) * 0.6 * (0.5 + Math.random() * 0.5);
                    tCtx.beginPath(); tCtx.moveTo(0, -dist); tCtx.lineTo(-subLen * 0.8, -dist - subLen * 0.5); tCtx.stroke();
                    tCtx.beginPath(); tCtx.moveTo(0, -dist); tCtx.lineTo(subLen * 0.8, -dist - subLen * 0.5); tCtx.stroke();
                }
                tCtx.restore();
            }
            return c;
        }

        function createParticleTexture() {
            const size = 16, c = document.createElement('canvas');
            c.width = c.height = size;
            const tCtx = c.getContext('2d'), center = size / 2, radius = Math.random() * 3 + 2;
            const gradient = tCtx.createRadialGradient(center, center, 0, center, center, radius);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.8)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            tCtx.fillStyle = gradient;
            tCtx.beginPath(); tCtx.arc(center, center, radius, 0, Math.PI * 2); tCtx.fill();
            return c;
        }

        function generateTextures() {
            textures = [];
            for (let i = 0; i < 12; i++) textures.push(createSnowflakeTexture());
            for (let i = 0; i < 8; i++) textures.push(createParticleTexture());
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();
        generateTextures();

        class Particle {
            constructor() { this.reset(true); }
            reset(initial = false) {
                const range = 2000;
                this.x = (Math.random() - 0.5) * range;
                this.y = initial ? (Math.random() - 0.5) * range : -range / 2 - 100;
                this.z = (Math.random() - 0.5) * range;
                this.texture = textures[Math.floor(Math.random() * textures.length)];
                this.scale = Math.random() * 0.5 + 0.5;
                this.fallSpeed = Math.random() * 2 + 1;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
            }
            update() {
                this.y += this.fallSpeed * CONFIG.baseSpeed;
                let windForce = CONFIG.baseWind;
                if (CONFIG.windChaos) windForce += (Math.random() - 0.5) * 2;
                this.x += windForce;
                this.rotation += this.rotationSpeed;
                const range = 1000;
                if (this.y > range) this.y = -range;
                if (this.x > range) this.x = -range;
                if (this.x < -range) this.x = range;
                if (this.z > range) this.z = -range;
                if (this.z < -range) this.z = range;
            }
            draw() {
                let x1 = this.x * Math.cos(angleY) - this.z * Math.sin(angleY);
                let z1 = this.z * Math.cos(angleY) + this.x * Math.sin(angleY);
                let y1 = this.y * Math.cos(angleX) - z1 * Math.sin(angleX);
                let z2 = z1 * Math.cos(angleX) + this.y * Math.sin(angleX);
                let scale = CONFIG.fov / (CONFIG.fov + z2);
                if (scale < 0 || z2 < -CONFIG.fov + 50) return;
                let x2d = x1 * scale + width / 2;
                let y2d = y1 * scale + height / 2;
                let size = 40 * this.scale * scale * CONFIG.baseSize;
                ctx.save();
                ctx.translate(x2d, y2d);
                ctx.scale(scale, scale);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = Math.min(1, (z2 + 1000) / 2000);
                ctx.drawImage(this.texture, -size / 2, -size / 2, size, size);
                ctx.restore();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < CONFIG.particleCount; i++) particles.push(new Particle());
        }
        init();

        // ── 鼠标拖拽旋转（绑定在 document，全屏有效）──
        document.addEventListener('mousedown', (e) => {
            // 点击到按钮/面板时不触发旋转
            if (e.target.closest('#bottom-bar') || e.target.closest('#ui-panel')) return;
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        });
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            angleY += (e.clientX - lastX) * 0.005;
            angleX += (e.clientY - lastY) * 0.005;
            angleX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, angleX));
            lastX = e.clientX;
            lastY = e.clientY;
        });
        document.addEventListener('mouseup', () => { isDragging = false; });

        // ── 触摸旋转（全屏有效，绑在 document）──
        document.addEventListener('touchstart', (e) => {
            if (e.target.closest('#bottom-bar') || e.target.closest('#ui-panel')) return;
            const touch = e.touches[0];
            isDragging = true;
            lastX = touch.clientX;
            lastY = touch.clientY;
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const touch = e.touches[0];
            angleY += (touch.clientX - lastX) * 0.008;
            angleX += (touch.clientY - lastY) * 0.008;
            angleX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, angleX));
            lastX = touch.clientX;
            lastY = touch.clientY;
        }, { passive: false });

        document.addEventListener('touchend', () => { isDragging = false; });

        // ── 控制面板绑定 ──
        function updateConfig(id, key, isFloat = true) {
            const el = document.getElementById(id);
            const valSpan = document.getElementById('val-' + id);
            el.addEventListener('input', (e) => {
                const val = isFloat ? parseFloat(e.target.value) : e.target.value;
                CONFIG[key] = val;
                if (valSpan) valSpan.textContent = isFloat ? val.toFixed(1) : val;
            });
        }

        updateConfig('speed', 'baseSpeed');
        updateConfig('size', 'baseSize');
        updateConfig('wind', 'baseWind');
        updateConfig('bgColor', 'bgColor', false);
        updateConfig('bgDarkness', 'bgDarkness');

        document.getElementById('density').addEventListener('input', (e) => {
            CONFIG.particleCount = parseInt(e.target.value);
            document.getElementById('val-density').textContent = CONFIG.particleCount;
            init();
        });

        document.getElementById('windChaos').addEventListener('change', (e) => {
            CONFIG.windChaos = e.target.checked;
        });

        // ── 渲染循环 ──
        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = CONFIG.bgColor;
            ctx.fillRect(0, 0, width, height);
            const darkGrad = ctx.createRadialGradient(width / 2, height / 2, 0, width / 2, height / 2, height);
            darkGrad.addColorStop(0, 'rgba(0,0,0,0)');
            darkGrad.addColorStop(1, `rgba(0,0,0,${CONFIG.bgDarkness})`);
            ctx.fillStyle = darkGrad;
            ctx.fillRect(0, 0, width, height);
            for (let p of particles) { p.update(); p.draw(); }
        }
        animate();
    </script>
</body>

</html>
