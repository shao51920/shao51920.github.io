<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>觉醒诗社</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <meta name="description" content="觉醒是一场从内部燃起的革命。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700;900&family=Cinzel:wght@400;700&family=Inter:wght@200;300;400&display=swap"
    rel="stylesheet" />
  <link rel="preload" as="image" href="逍遥游.webp" fetchpriority="high" />
  <link rel="stylesheet" href="shared/auth.css">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dark: #8a6a1a;
      --deep: #040209;
      --void: #080414;
      --purple-deep: #120820;
      --white-soft: rgba(255, 255, 255, 0.88);
      --glow-gold: 0 0 30px rgba(201, 168, 76, 0.6), 0 0 80px rgba(201, 168, 76, 0.2);
      --glow-white: 0 0 20px rgba(255, 255, 255, 0.4);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--void);
      color: var(--white-soft);
      font-family: 'Noto Serif SC', serif;
      cursor: auto;
    }

    /* ── Canvas 星域 ── */
    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: block;
    }

    /* ── 神圣光晕背景 ── */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 1;
      animation: orbFloat 12s ease-in-out infinite alternate;
    }

    .bg-orb-1 {
      width: 60vw;
      height: 60vw;
      top: -20vw;
      left: -10vw;
      background: radial-gradient(circle, rgba(80, 20, 160, 0.35) 0%, transparent 70%);
      animation-delay: 0s;
    }

    .bg-orb-2 {
      width: 50vw;
      height: 50vw;
      bottom: -15vw;
      right: -10vw;
      background: radial-gradient(circle, rgba(180, 120, 20, 0.25) 0%, transparent 70%);
      animation-delay: -5s;
    }

    .bg-orb-3 {
      width: 40vw;
      height: 40vw;
      top: 30%;
      left: 30%;
      background: radial-gradient(circle, rgba(60, 10, 120, 0.2) 0%, transparent 70%);
      animation-delay: -3s;
      animation-duration: 16s;
    }

    @keyframes orbFloat {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(3vw, 5vh) scale(1.08);
      }
    }

    /* 首页专属登录欢迎样式 */
    .home-auth-welcome {
      margin: 20px auto 10px auto;
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 2px;
      font-weight: 300;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeSlideUp 0.85s ease 1.8s forwards;
      text-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
    }

    .home-auth-welcome.show {
      opacity: 1;
      transform: translateY(0);
    }

    .home-auth-login-trigger {
      position: relative;
      display: inline-block;
      color: var(--gold-light);
      text-decoration: none;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.4s ease;
      padding: 4px 12px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.1) 0%, rgba(201, 168, 76, 0.05) 100%);
      border: 1px solid rgba(201, 168, 76, 0.3);
      box-shadow: 0 0 15px rgba(201, 168, 76, 0.2), inset 0 0 10px rgba(201, 168, 76, 0.05);
    }

    .home-auth-login-trigger::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.1) 50%, transparent 100%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .home-auth-login-trigger:hover {
      color: #fff;
      border-color: var(--gold-light);
      box-shadow: 0 0 25px rgba(201, 168, 76, 0.4), inset 0 0 15px rgba(201, 168, 76, 0.1);
      transform: translateY(-2px);
    }

    .home-auth-login-trigger:hover::before {
      opacity: 1;
    }

    /* 首页专属个人资料按钮美化 */
    #auth-status {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 100;
      opacity: 0;
      animation: fadeIn 1.5s ease 1s forwards;
    }

    .home-profile-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.48rem;
      padding: 0.38rem 0.92rem;
      background: rgba(201, 168, 76, 0.05);
      color: var(--gold-light);
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 40px;
      font-family: 'Noto Serif SC', serif;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 20px rgba(201, 168, 76, 0.1);
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    /* 按钮流光特效 */
    .home-profile-btn::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 40px;
      height: 200%;
      background: linear-gradient(
        to right,
        transparent,
        rgba(255, 255, 255, 0.2),
        transparent
      );
      transform: rotate(35deg);
      transition: left 0.6s ease;
      pointer-events: none;
    }

    .home-profile-btn:hover::after {
      left: 120%;
    }

    .home-profile-btn svg {
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      filter: drop-shadow(0 0 5px rgba(201, 168, 76, 0.3));
    }

    .home-profile-btn:hover {
      background: rgba(201, 168, 76, 0.12);
      border-color: var(--gold-light);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(201, 168, 76, 0.25), 0 0 30px rgba(201, 168, 76, 0.1);
    }

    .home-profile-btn:hover svg {
      transform: scale(1.1);
      filter: drop-shadow(0 0 8px rgba(201, 168, 76, 0.6));
    }

    .home-profile-btn .auth-avatar {
      width: 20px;
      height: 20px;
      border: 1px solid rgba(201, 168, 76, 0.28);
      background: rgba(201, 168, 76, 0.08);
    }

    .home-profile-btn .auth-avatar-emoji {
      font-size: 12px;
    }

    .home-profile-btn span {
      max-width: 78px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .home-profile-btn:active {
      transform: translateY(0) scale(0.98);
    }

    /* 按钮呼吸感 */
    @keyframes btnPulse {
      0% { box-shadow: 0 0 15px rgba(201, 168, 76, 0.1); }
      50% { box-shadow: 0 0 25px rgba(201, 168, 76, 0.2); }
      100% { box-shadow: 0 0 15px rgba(201, 168, 76, 0.1); }
    }

    .home-profile-btn {
      animation: btnPulse 3s infinite ease-in-out;
    }

    /* ── 鲸鱼背景 ── */
    .whale-bg {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.35;
      mix-blend-mode: lighten;
      overflow: hidden;
    }

    .whale-img {
      position: absolute;
      width: 110vw;
      height: 110vh;
      top: -5vh;
      left: -5vw;
      display: block;
      object-fit: cover;
      object-position: center;
      animation: whaleSwim 60s ease-in-out infinite alternate;
      will-change: transform;
      transform: translate3d(0, 0, 0);
      backface-visibility: hidden;
      contain: paint;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    body.whale-ready .whale-img {
      opacity: 1;
    }

    @keyframes whaleSwim {
      0% {
        transform: translate(0, 0) rotate(-0.5deg) scale(1);
      }

      50% {
        transform: translate(2vw, 1vh) rotate(0.5deg) scale(1.02);
      }

      100% {
        transform: translate(-1vw, -1vh) rotate(-0.2deg) scale(1.01);
      }
    }

    /* ── 主内容容器 ── */
    #main {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      /* 改为 flex-start 使整体上移 */
      text-align: center;
      padding-top: 3vh;
      /* 减小顶部 padding，让眼睛和标题进一步往上 */
    }

    /* ── 顶部标记 ── */
    .label-top {
      display: none;
      /* 彻底移除 */
    }

    /* ── 神圣符文圆环 ── */
    .rune-ring-wrapper {
      position: relative;
      width: clamp(100px, 15vw, 180px);
      height: clamp(100px, 15vw, 180px);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeScale 1.5s ease 0.8s forwards;
    }

    .rune-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(201, 168, 76, 0.5);
      animation: spinSlow 20s linear infinite;
    }

    .rune-ring::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px dashed rgba(201, 168, 76, 0.3);
      animation: spinSlow 30s linear infinite reverse;
    }

    .rune-ring::after {
      content: '';
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      border: 1px solid rgba(201, 168, 76, 0.2);
    }

    .rune-inner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rune-eye {
      width: 44%;
      height: 44%;
      position: relative;
    }

    .rune-eye svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 12px rgba(201, 168, 76, 0.8)) drop-shadow(0 0 30px rgba(201, 168, 76, 0.4));
    }

    .rune-dots {
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }

    .rune-dot {
      position: absolute;
      width: 5px;
      height: 5px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--gold);
      transform-origin: 50% calc(50% + clamp(45px, 7vw, 85px));
    }

    @keyframes spinSlow {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    /* ── 主标题 ── */
    .title-zh {
      font-family: 'Noto Serif SC', serif;
      font-weight: 900;
      font-size: clamp(3.5rem, 10vw, 8rem);
      line-height: 1;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f0d080 0%, #c9a84c 40%, #ffffff 60%, #c9a84c 80%, #8a6a1a 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% 200%;
      animation: shimmerTitle 4s ease-in-out infinite alternate, fadeSlideUp 1.2s ease 1.2s both;
      margin-bottom: 0.2rem;
      text-shadow: none;
      position: relative;
    }

    .title-zh::after {
      content: '觉醒诗社';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #f0d080 0%, #c9a84c 40%, #ffffff 60%, #c9a84c 80%, #8a6a1a 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: blur(20px);
      opacity: 0.5;
      z-index: -1;
    }

    @keyframes shimmerTitle {
      0% {
        background-position: 0% 0%;
      }

      100% {
        background-position: 100% 100%;
      }
    }

    .title-en {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: clamp(0.8rem, 2vw, 1.2rem);
      letter-spacing: 0.5em;
      color: var(--gold);
      opacity: 0;
      text-transform: uppercase;
      animation: fadeSlideUp 1.2s ease 1.6s forwards;
      margin-bottom: 1.5rem;
    }

    /* ── 横线分隔 ── */
    .divider {
      width: clamp(50px, 10vw, 100px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 1.5rem;
      opacity: 0;
      animation: fadeIn 1s ease 2s forwards;
    }

    /* ── 打字机副标题 ── */
    .subtitle {
      font-family: 'Noto Serif SC', serif;
      font-weight: 300;
      font-size: clamp(0.8rem, 1.8vw, 1rem);
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.65);
      letter-spacing: 0.15em;
      max-width: 520px;
      opacity: 0;
      animation: fadeIn 1s ease 2.3s forwards;
      min-height: 2.5em;
    }

    .typewriter-cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--gold);
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    /* ── 进入按钮 ── */
    .enter-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin-top: 0;
      width: clamp(200px, 20vw, 260px);
      height: clamp(48px, 6vh, 56px);
      padding: 0;
      border: 1px solid var(--gold);
      background: rgba(201, 168, 76, 0.05);
      color: var(--gold-light);
      font-family: 'Noto Serif SC', serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeSlideUp 1s ease 3s forwards;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-decoration: none;
      box-shadow: 0 0 15px rgba(201, 168, 76, 0.12);
    }

    .enter-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }

    .enter-btn:hover::before {
      transform: translateX(100%);
    }

    .enter-btn:hover {
      border-color: var(--gold-light);
      color: #fff;
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 50px rgba(201, 168, 76, 0.4), 0 0 30px rgba(201, 168, 76, 0.2);
      background: rgba(201, 168, 76, 0.15);
    }

    .btn-arrow {
      font-size: 1.2rem;
      transition: transform 0.3s;
    }

    .enter-btn:hover .btn-arrow {
      transform: translateX(8px);
    }

    /* ── 测评入口容器 ── */
    .evaluation-entries {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 1.5rem;
      /* 调整间距，使入口抬升到登录位置下方 */
      opacity: 0;
      animation: fadeSlideUp 0.8s ease 1.8s forwards;
      perspective: 1000px;
    }

    .evaluation-entries.more-entries {
      margin-top: 1rem;
      margin-bottom: 2rem;
      animation-delay: 2.05s;
    }

    /* ── 底部标签 ── */
    .footer-tags {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 2.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      font-weight: 200;
      letter-spacing: 0.35em;
      color: rgba(255, 255, 255, 0.25);
      text-transform: uppercase;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1.5s ease 2.8s forwards;
    }

    .footer-tags span::before {
      content: '·';
      margin-right: 1rem;
      color: var(--gold-dark);
    }

    /* ── 侧边光线 ── */
    .side-light {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent 0%, rgba(201, 168, 76, 0.3) 30%, rgba(201, 168, 76, 0.6) 50%, rgba(201, 168, 76, 0.3) 70%, transparent 100%);
      z-index: 2;
      opacity: 0;
      animation: fadeIn 2s ease 1s forwards;
    }

    .side-light-left {
      left: 5vw;
    }

    .side-light-right {
      right: 5vw;
    }

    /* ── 角落纹饰 ── */
    .corner {
      position: fixed;
      width: 60px;
      height: 60px;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1.5s ease 1s forwards;
    }

    .corner svg {
      width: 100%;
      height: 100%;
    }

    .corner-tl {
      top: 2rem;
      left: 2rem;
    }

    .corner-tr {
      top: 2rem;
      right: 2rem;
      transform: scaleX(-1);
    }

    .corner-bl {
      bottom: 2rem;
      left: 2rem;
      transform: scaleY(-1);
    }

    .corner-br {
      bottom: 2rem;
      right: 2rem;
      transform: scale(-1);
    }

    /* ── 通用动画 ── */
    @keyframes fadeSlideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeScale {
      from {
        opacity: 0;
        transform: scale(0.8);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* ── 响应式 ── */
    @media (max-width: 600px) {

      .side-light,
      .corner,
      .footer-tags {
        display: none;
      }

      .title-zh {
        font-size: clamp(3rem, 15vw, 5rem);
      }

      .evaluation-entries {
        flex-direction: column;
        gap: 15px !important;
        align-items: center;
      }

      .enter-btn {
        width: 240px;
      }
    }
  </style>
</head>

<body>

  <!-- 光标 -->

  <!-- 星空画布 -->
  <canvas id="starfield"></canvas>

  <!-- 背景光晕 -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <!-- 鲸鱼背景 -->
  <div class="whale-bg">
    <img class="whale-img" src="逍遥游.webp" alt="" aria-hidden="true" decoding="async" fetchpriority="high" draggable="false">
  </div>

  <!-- 侧边光线 -->
  <div class="side-light side-light-left"></div>
  <div class="side-light side-light-right"></div>

  <!-- 角落纹饰 -->
  <div class="corner corner-tl">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 58 L2 2 L58 2" stroke="rgba(201,168,76,0.5)" stroke-width="1" />
      <path d="M2 30 L12 2" stroke="rgba(201,168,76,0.3)" stroke-width="0.5" />
      <circle cx="2" cy="2" r="3" fill="rgba(201,168,76,0.6)" />
    </svg>
  </div>
  <div class="corner corner-tr">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 58 L2 2 L58 2" stroke="rgba(201,168,76,0.5)" stroke-width="1" />
      <path d="M2 30 L12 2" stroke="rgba(201,168,76,0.3)" stroke-width="0.5" />
      <circle cx="2" cy="2" r="3" fill="rgba(201,168,76,0.6)" />
    </svg>
  </div>
  <div class="corner corner-bl">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 58 L2 2 L58 2" stroke="rgba(201,168,76,0.5)" stroke-width="1" />
      <path d="M2 30 L12 2" stroke="rgba(201,168,76,0.3)" stroke-width="0.5" />
      <circle cx="2" cy="2" r="3" fill="rgba(201,168,76,0.6)" />
    </svg>
  </div>
  <div class="corner corner-br">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 58 L2 2 L58 2" stroke="rgba(201,168,76,0.5)" stroke-width="1" />
      <path d="M2 30 L12 2" stroke="rgba(201,168,76,0.3)" stroke-width="0.5" />
      <circle cx="2" cy="2" r="3" fill="rgba(201,168,76,0.6)" />
    </svg>
  </div>

  <!-- 右上角个人资料入口 -->
  <div id="auth-status"></div>

  <!-- 主内容 -->
  <main id="main">
    <!-- 神圣符文环 -->
    <div class="rune-ring-wrapper" id="runeRing">
      <div class="rune-ring"></div>
      <div class="rune-dots" id="runeDots"></div>
      <div class="rune-inner">
        <div class="rune-eye">
          <!-- 第三只眼 SVG -->
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 外眼轮廓 -->
            <path d="M10 50 Q50 10 90 50 Q50 90 10 50 Z" stroke="rgba(201,168,76,0.9)" stroke-width="1.5" fill="none" />

  <script>
    const whaleImage = document.querySelector('.whale-img');
    const revealWhale = () => document.body.classList.add('whale-ready');
    if (whaleImage) {
      if (whaleImage.complete && whaleImage.naturalWidth > 0) {
        revealWhale();
      } else {
        whaleImage.addEventListener('load', revealWhale, { once: true });
        whaleImage.addEventListener('error', revealWhale, { once: true });
        if (typeof whaleImage.decode === 'function') {
          whaleImage.decode().then(revealWhale).catch(() => {});
        }
      }
    }
    setTimeout(revealWhale, 1200);

    /* ────────────────────────────────
       2. 星空粒子
    ──────────────────────────────── */
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    let onViewportResize = null;
    window.addEventListener('resize', () => {
      resize();
      if (typeof onViewportResize === 'function') onViewportResize();
    });

    const STARS = window.innerWidth < 768 ? 180 : 240;
    const stars = Array.from({ length: STARS }, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 1.5 + 0.2,
      speed: Math.random() * 0.15 + 0.03,
      alpha: Math.random() * 0.7 + 0.1,
      twinkleSpeed: Math.random() * 0.015 + 0.005,
      twinkleDir: Math.random() > 0.5 ? 1 : -1,
      gold: Math.random() < 0.12
    }));

    // 流星
    const METEORS = 3;
    const meteors = Array.from({ length: METEORS }, () => newMeteor());
    function newMeteor() {
      return {
        x: Math.random() * window.innerWidth * 0.7,
        y: Math.random() * window.innerHeight * 0.4,
        len: Math.random() * 160 + 80,
        speed: Math.random() * 4 + 2,
        alpha: 0,
        life: 0,
        maxLife: Math.random() * 80 + 40,
        delay: Math.random() * 300
      };
    }

    let starsAnimating = false;

    function drawStars() {
      starsAnimating = true;
      if (document.hidden) {
        starsAnimating = false;
        return;
      }
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      stars.forEach(s => {
        s.alpha += s.twinkleSpeed * s.twinkleDir;
        if (s.alpha >= 0.85 || s.alpha <= 0.1) s.twinkleDir *= -1;

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        if (s.gold) {
          ctx.fillStyle = `rgba(201,168,76,${s.alpha})`;
        } else {
          ctx.fillStyle = `rgba(220,220,255,${s.alpha * 0.8})`;
        }
        ctx.fill();
      });

      // 流星
      meteors.forEach((m, i) => {
        if (m.delay > 0) { m.delay--; return; }
        m.life++;
        m.alpha = m.life < 10 ? m.life / 10 : (m.life > m.maxLife - 10 ? (m.maxLife - m.life) / 10 : 1);
        m.x += m.speed * 1.5;
        m.y += m.speed;

        const grad = ctx.createLinearGradient(m.x, m.y, m.x - m.len, m.y - m.len * 0.67);
        grad.addColorStop(0, `rgba(240,208,128,${m.alpha * 0.9})`);
        grad.addColorStop(1, 'rgba(240,208,128,0)');
        ctx.beginPath();
        ctx.moveTo(m.x, m.y);
        ctx.lineTo(m.x - m.len, m.y - m.len * 0.67);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        if (m.life >= m.maxLife || m.x > canvas.width || m.y > canvas.height) {
          meteors[i] = newMeteor();
          meteors[i].delay = Math.random() * 200 + 100;
        }
      });

      requestAnimationFrame(drawStars);
    }
    drawStars();

    /* ────────────────────────────────
       3. 符文环上的旋转点
    ──────────────────────────────── */
    const dotsContainer = document.getElementById('runeDots');
    const dotCount = 12;
    const ring = document.getElementById('runeRing');
    let ringSize = 0;
    let ringRadiusPercent = 0;
    const runeDots = [];

    function refreshRingMetrics() {
      ringSize = ring.getBoundingClientRect().width || ring.offsetWidth || 1;
      ringRadiusPercent = (ringSize / 2 - 4) / ringSize * 100 - 0.5;
    }

    function placeDots() {
      dotsContainer.innerHTML = '';
      runeDots.length = 0;
      refreshRingMetrics();
      for (let i = 0; i < dotCount; i++) {
        const angle = (i / dotCount) * 2 * Math.PI;
        const dot = document.createElement('div');
        dot.className = 'rune-dot';
        const x = 50 + ringRadiusPercent * Math.cos(angle);
        const y = 50 + ringRadiusPercent * Math.sin(angle);
        dot.style.cssText = `
          left: ${x}%;
          top: ${y}%;
          transform: translate(-50%, -50%) rotate(${angle}rad);
          opacity: ${i % 3 === 0 ? 1 : i % 3 === 1 ? 0.5 : 0.2};
          width: ${i % 4 === 0 ? '6px' : '3px'};
          height: ${i % 4 === 0 ? '6px' : '3px'};
        `;
        dotsContainer.appendChild(dot);
        runeDots.push(dot);
      }
    }
    placeDots();
    onViewportResize = placeDots;

    // 让点旋转
    let dotAngle = 0;
    let dotsAnimating = false;
    (function rotateDots() {
      dotsAnimating = true;
      if (document.hidden) {
        dotsAnimating = false;
        return;
      }
      dotAngle += 0.005;
      runeDots.forEach((dot, i) => {
        const angle = (i / dotCount) * 2 * Math.PI + dotAngle;
        const x = 50 + ringRadiusPercent * Math.cos(angle);
        const y = 50 + ringRadiusPercent * Math.sin(angle);
        dot.style.left = x + '%';
        dot.style.top = y + '%';
      });
      requestAnimationFrame(rotateDots);
    })();

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        if (!starsAnimating) requestAnimationFrame(drawStars);
        if (!dotsAnimating) requestAnimationFrame(rotateDots);
      }
    });

    /* ────────────────────────────────
       4. 打字机效果
    ──────────────────────────────── */
    const lines = [
      '认识生命真相，活出觉醒人生',
      '在你醒来之前，你从未真正活过',
      '当死亡降临时，我们才如梦方醒',
      '真实的永远不会消失，虚假的从来都不存在'
    ];
    const typeEl = document.getElementById('typeText');
    let lineIndex = 0, charIndex = 0, isDeleting = false;
    let typeStarted = false;

    function typeWriter() {
      const current = lines[lineIndex];
      if (!isDeleting) {
        typeEl.textContent = current.slice(0, ++charIndex);
        if (charIndex === current.length) {
          isDeleting = true;
          setTimeout(typeWriter, 2200);
          return;
        }
      } else {
        typeEl.textContent = current.slice(0, --charIndex);
        if (charIndex === 0) {
          isDeleting = false;
          lineIndex = (lineIndex + 1) % lines.length;
        }
      }
      setTimeout(typeWriter, isDeleting ? 45 : 100);
    }

    // 动画完成后开始打字
    setTimeout(() => typeWriter(), 2600);

    /* ────────────────────────────────
       6. 鼠标视差
    ──────────────────────────────── */
    const runeRingWrapper = document.querySelector('.rune-ring-wrapper');
    const titleZh = document.querySelector('.title-zh');
    let parallaxDX = 0;
    let parallaxDY = 0;
    let parallaxFrame = 0;

    function renderParallax() {
      parallaxFrame = 0;
      if (runeRingWrapper) {
        runeRingWrapper.style.transform = `translate(${parallaxDX * 8}px, ${parallaxDY * 8}px) scale(1)`;
      }
      if (titleZh) {
        titleZh.style.textShadow = `${parallaxDX * 10}px ${parallaxDY * 10}px 40px rgba(201,168,76,0.3)`;
      }
    }

    function queueParallaxRender() {
      if (!parallaxFrame) {
        parallaxFrame = requestAnimationFrame(renderParallax);
      }
    }

    document.addEventListener('mousemove', e => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      parallaxDX = (e.clientX - cx) / cx;
      parallaxDY = (e.clientY - cy) / cy;
      queueParallaxRender();
    }, { passive: true });

    document.addEventListener('mouseleave', () => {
      parallaxDX = 0;
      parallaxDY = 0;
      queueParallaxRender();
    });

    renderParallax();
  </script>
