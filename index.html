<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>觉醒诗社</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <meta name="description" content="觉醒是一场从内部燃起的革命。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700;900&family=Cinzel:wght@400;700&family=Inter:wght@200;300;400&display=swap"
    rel="stylesheet" />
  <link rel="preload" as="image" href="逍遥游.webp" fetchpriority="high" />
  <link rel="stylesheet" href="shared/auth.css">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dark: #8a6a1a;
      --deep: #040209;
      --void: #080414;
      --purple-deep: #120820;
      --white-soft: rgba(255, 255, 255, 0.88);
      --glow-gold: 0 0 30px rgba(201, 168, 76, 0.6), 0 0 80px rgba(201, 168, 76, 0.2);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--void);
      color: var(--white-soft);
      font-family: 'Noto Serif SC', serif;
    }

    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: block;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      animation: orbFloat 12s ease-in-out infinite alternate;
    }

    .bg-orb-1 { width: 60vw; height: 60vw; top: -20vw; left: -10vw; background: radial-gradient(circle at 30% 30%, rgba(100, 40, 180, 0.5) 0%, transparent 50%); }
    .bg-orb-2 { width: 50vw; height: 50vw; bottom: -15vw; right: -10vw; background: radial-gradient(circle at 40% 40%, rgba(200, 140, 40, 0.4) 0%, transparent 50%); }

    @keyframes orbFloat {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      100% { transform: translate3d(3vw, 5vh, 0) scale(1.08); }
    }

    /* 首页专属样式 */
    .home-auth-welcome {
      margin: 20px auto 10px auto;
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 2px;
      font-weight: 300;
      opacity: 0;
      transform: translateY(16px);
      transition: all 0.85s ease;
      text-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
    }
    .home-auth-welcome.show { opacity: 1; transform: translateY(0); }
    .home-auth-login-trigger {
      color: var(--gold-light);
      cursor: pointer;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid rgba(201, 168, 76, 0.3);
      transition: all 0.4s;
    }
    .home-auth-login-trigger:hover { color: #fff; border-color: var(--gold-light); box-shadow: 0 0 25px rgba(201, 168, 76, 0.4); }

    #auth-status {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 100;
      opacity: 0;
      animation: fadeIn 1.5s ease 1s forwards;
    }

    .home-profile-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.48rem;
      padding: 0.38rem 0.92rem;
      background: rgba(201, 168, 76, 0.05);
      color: var(--gold-light);
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 40px;
      font-size: 0.68rem;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: all 0.5s;
    }
    .home-profile-btn:hover { background: rgba(201, 168, 76, 0.12); border-color: var(--gold-light); color: #fff; transform: translateY(-2px); }

    .whale-bg { position: fixed; inset: 0; z-index: 1; opacity: 0.35; mix-blend-mode: lighten; }
    .whale-img { width: 110vw; height: 110vh; object-fit: cover; animation: whaleSwim 60s ease-in-out infinite alternate; opacity: 0; transition: opacity 0.6s; }
    body.whale-ready .whale-img { opacity: 1; }

    @keyframes whaleSwim {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(2vw, 1vh, 0) scale(1.02); }
    }

    #main {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      padding-top: 3vh;
    }

    .rune-ring-wrapper {
      position: relative;
      width: clamp(100px, 15vw, 180px);
      height: clamp(100px, 15vw, 180px);
      margin-bottom: 1rem;
    }

    .title-zh {
      font-weight: 900;
      font-size: clamp(3.5rem, 10vw, 8rem);
      background: linear-gradient(135deg, #f0d080, #c9a84c, #fff, #8a6a1a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200%;
      animation: shimmer 4s infinite alternate;
    }

    .title-en { font-family: 'Cinzel', serif; letter-spacing: 0.5em; color: var(--gold); margin-bottom: 1.5rem; }
    .divider { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin-bottom: 1.5rem; }
    .subtitle { color: rgba(255, 255, 255, 0.65); letter-spacing: 0.15em; min-height: 2.5em; }

    .enter-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      padding: 12px 30px;
      border: 1px solid var(--gold);
      background: rgba(201, 168, 76, 0.05);
      color: var(--gold-light);
      text-decoration: none;
      font-weight: 700;
      transition: all 0.4s;
      margin-top: 1rem;
    }
    .enter-btn:hover { background: rgba(201, 168, 76, 0.15); border-color: var(--gold-light); color: #fff; transform: translateY(-5px); }

    .evaluation-entries { display: flex; gap: 20px; margin-top: 1.5rem; }

    @keyframes shimmer { 0% { background-position: 0%; } 100% { background-position: 100%; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>

<body>
  <canvas id="starfield"></canvas>
  <div class="whale-bg"><img class="whale-img" src="逍遥游.webp" alt=""></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <!-- #auth-status 将由 layout.js 动态注入，如果不存在的话 -->

  <main id="main">
    <div class="rune-ring-wrapper" id="runeRing">
      <!-- 圣符文环 -->
      <svg viewBox="0 0 100 100" style="width:100%; height:100%">
        <path d="M10 50 Q50 10 90 50 Q50 90 10 50 Z" stroke="rgba(201,168,76,0.9)" stroke-width="1.5" fill="none" />
        <circle cx="50" cy="50" r="18" stroke="rgba(201,168,76,0.7)" stroke-width="1" fill="none" />
        <circle cx="50" cy="50" r="8" fill="rgba(201,168,76,0.9)" />
      </svg>
    </div>

    <h1 class="title-zh">觉 醒 诗 社</h1>
    <p class="title-en">A W A K E N I N G · P O E T R Y</p>
    <div class="divider"></div>

    <p class="subtitle">
      <span id="typeText"></span><span class="typewriter-cursor">|</span>
    </p>

    <!-- 动态填充的欢迎语容器 -->
    <div id="home-greeting" class="home-auth-welcome"></div>

    <div class="evaluation-entries">
      <a href="SoulLab/index.html" class="enter-btn">灵性人格测试 →</a>
      <a href="ObjTest/index.html" class="enter-btn">自我客体化测评 →</a>
    </div>
    <div class="evaluation-entries">
       <a href="Snow/index.html" class="enter-btn">在线赏雪 →</a>
       <a href="https://ncnra455tpou.feishu.cn/wiki/R4y5wdFngiviwWkz1uQcYSDInmh" target="_blank" class="enter-btn">觉醒智库 →</a>
    </div>
  </main>

  <script>
    /* ── 0. 准备工作 ── */
    (function(){ 
        const url = new URL(window.location.href); 
        if (url.searchParams.get('welcome') === 'newuser') { 
            url.searchParams.delete('welcome'); 
            window.history.replaceState({}, '', url.toString()); 
            window._showWelcomeToastPending = true; 
        } 
    })();

    /* ── 1. 鲸鱼加载 ── */
    const reveal = () => document.body.classList.add('whale-ready');
    const img = document.querySelector('.whale-img');
    if (img.complete) reveal(); else img.onload = reveal;

    /* ── 2. 星空背景 ── */
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let w, h, stars = [];
    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.onresize = resize; resize();
    for(let i=0; i<150; i++) stars.push({ x: Math.random()*w, y: Math.random()*h, r: Math.random()*1, s: Math.random()*0.05 });
    const draw = () => {
        ctx.clearRect(0,0,w,h);
        stars.forEach(s => {
            s.x += s.s; if(s.x > w) s.x = 0;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
            ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.fill();
        });
        requestAnimationFrame(draw);
    };
    draw();

    /* ── 3. 打字机效果 ── */
    const lines = ['认识生命真相，活出觉醒人生', '在你醒来之前，你从未真正活过', '当死亡降临时，我们才如梦方醒'];
    let lineIdx = 0, charIdx = 0, isDel = false;
    const type = () => {
      const cur = lines[lineIdx];
      const el = document.getElementById('typeText');
      if (!el) return;
      el.textContent = cur.slice(0, charIdx);
      if (!isDel) {
          charIdx++;
          if (charIdx > cur.length) { isDel = true; setTimeout(type, 2000); return; }
      } else {
          charIdx--;
          if (charIdx === 0) { isDel = false; lineIdx = (lineIdx + 1) % lines.length; }
      }
      setTimeout(type, isDel ? 50 : 120);
    };
    setTimeout(type, 1000);
  </script>

  <!-- 核心依赖引入 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared/supabase-config.js"></script>
  <script src="shared/auth.js"></script>
  <script src="shared/layout.js"></script>
</body>

</html>
