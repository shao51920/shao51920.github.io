<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>觉醒诗社</title>
  <meta name="description" content="觉醒是一场从内部燃起的革命。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700;900&family=Cinzel:wght@400;700&family=Inter:wght@200;300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared/auth.css">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dark: #8a6a1a;
      --deep: #040209;
      --void: #080414;
      --purple-deep: #120820;
      --white-soft: rgba(255,255,255,0.88);
      --glow-gold: 0 0 30px rgba(201,168,76,0.6), 0 0 80px rgba(201,168,76,0.2);
      --glow-white: 0 0 20px rgba(255,255,255,0.4);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--void);
      color: var(--white-soft);
      font-family: 'Noto Serif SC', serif;
      cursor: none;
    }

    /* ── 自定义光标 ── */
    #cursor {
      position: fixed;
      top: 0; left: 0;
      width: 12px; height: 12px;
      background: var(--gold-light);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: screen;
      transition: transform 0.1s ease, opacity 0.2s;
      transform: translate(-50%, -50%);
      box-shadow: var(--glow-gold);
    }
    #cursor-trail {
      position: fixed;
      top: 0; left: 0;
      width: 36px; height: 36px;
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.25s ease, opacity 0.3s;
      opacity: 0.6;
    }

    /* ── Canvas 星域 ── */
    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: block;
    }

    /* ── 神圣光晕背景 ── */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 1;
      animation: orbFloat 12s ease-in-out infinite alternate;
    }
    .bg-orb-1 {
      width: 60vw; height: 60vw;
      top: -20vw; left: -10vw;
      background: radial-gradient(circle, rgba(80,20,160,0.35) 0%, transparent 70%);
      animation-delay: 0s;
    }
    .bg-orb-2 {
      width: 50vw; height: 50vw;
      bottom: -15vw; right: -10vw;
      background: radial-gradient(circle, rgba(180,120,20,0.25) 0%, transparent 70%);
      animation-delay: -5s;
    }
    .bg-orb-3 {
      width: 40vw; height: 40vw;
      top: 30%; left: 30%;
      background: radial-gradient(circle, rgba(60,10,120,0.2) 0%, transparent 70%);
      animation-delay: -3s;
      animation-duration: 16s;
    }
    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(3vw, 5vh) scale(1.08); }
    }

    /* 首页专属登录欢迎样式 */
    .home-auth-welcome {
      margin: 20px auto 10px auto;
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 3px;
      font-weight: 300;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      text-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
    }
    .home-auth-welcome.show {
      opacity: 1;
      transform: translateY(0);
    }
    .home-auth-login-trigger {
      position: relative;
      display: inline-block;
      color: var(--gold-light);
      text-decoration: none;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.4s ease;
      padding: 4px 12px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.1) 0%, rgba(201, 168, 76, 0.05) 100%);
      border: 1px solid rgba(201, 168, 76, 0.3);
      box-shadow: 0 0 15px rgba(201, 168, 76, 0.2), inset 0 0 10px rgba(201, 168, 76, 0.05);
    }
    .home-auth-login-trigger::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.1) 50%, transparent 100%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .home-auth-login-trigger:hover {
      color: #fff;
      border-color: var(--gold-light);
      box-shadow: 0 0 25px rgba(201, 168, 76, 0.4), inset 0 0 15px rgba(201, 168, 76, 0.1);
      transform: translateY(-2px);
    }
    .home-auth-login-trigger:hover::before {
      opacity: 1;
    }

    /* ── 鲸鱼背景 ── */
    .whale-bg {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.35;
      mix-blend-mode: lighten;
      overflow: hidden;
    }
    .whale-img {
      position: absolute;
      width: 110vw;
      height: 110vh;
      top: -5vh;
      left: -5vw;
      background: url('逍遥游.webp') no-repeat center center;
      background-size: cover;
      animation: whaleSwim 45s ease-in-out infinite alternate;
      image-rendering: -webkit-optimize-contrast; /* 提高渲染性能 */
      will-change: transform; /* 告诉浏览器这个元素会变动，提前优化 */
    }
    @keyframes whaleSwim {
      0% { transform: translate(0, 0) rotate(-0.5deg) scale(1); }
      50% { transform: translate(2vw, 1vh) rotate(0.5deg) scale(1.02); }
      100% { transform: translate(-1vw, -1vh) rotate(-0.2deg) scale(1.01); }
    }

    /* ── 主内容容器 ── */
    #main {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start; /* 改为 flex-start 使整体上移 */
      text-align: center;
      padding-top: 3vh; /* 减小顶部 padding，让眼睛和标题进一步往上 */
    }

    /* ── 顶部标记 ── */
    .label-top {
      display: none; /* 彻底移除 */
    }

    /* ── 神圣符文圆环 ── */
    .rune-ring-wrapper {
      position: relative;
      width: clamp(100px, 15vw, 180px);
      height: clamp(100px, 15vw, 180px);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeScale 1.5s ease 0.8s forwards;
    }
    .rune-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.5);
      animation: spinSlow 20s linear infinite;
    }
    .rune-ring::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px dashed rgba(201,168,76,0.3);
      animation: spinSlow 30s linear infinite reverse;
    }
    .rune-ring::after {
      content: '';
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.2);
    }
    .rune-inner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .rune-eye {
      width: 44%;
      height: 44%;
      position: relative;
    }
    .rune-eye svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 12px rgba(201,168,76,0.8)) drop-shadow(0 0 30px rgba(201,168,76,0.4));
    }
    .rune-dots {
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }
    .rune-dot {
      position: absolute;
      width: 5px;
      height: 5px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--gold);
      transform-origin: 50% calc(50% + clamp(45px, 7vw, 85px));
    }
    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ── 主标题 ── */
    .title-zh {
      font-family: 'Noto Serif SC', serif;
      font-weight: 900;
      font-size: clamp(3.5rem, 10vw, 8rem);
      line-height: 1;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f0d080 0%, #c9a84c 40%, #ffffff 60%, #c9a84c 80%, #8a6a1a 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% 200%;
      animation: shimmerTitle 4s ease-in-out infinite alternate, fadeSlideUp 1.2s ease 1.2s both;
      margin-bottom: 0.2rem;
      text-shadow: none;
      position: relative;
    }
    .title-zh::after {
      content: '觉醒诗社';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #f0d080 0%, #c9a84c 40%, #ffffff 60%, #c9a84c 80%, #8a6a1a 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: blur(20px);
      opacity: 0.5;
      z-index: -1;
    }
    @keyframes shimmerTitle {
      0% { background-position: 0% 0%; }
      100% { background-position: 100% 100%; }
    }

    .title-en {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: clamp(0.8rem, 2vw, 1.2rem);
      letter-spacing: 0.5em;
      color: var(--gold);
      opacity: 0;
      text-transform: uppercase;
      animation: fadeSlideUp 1.2s ease 1.6s forwards;
      margin-bottom: 1.5rem;
    }

    /* ── 横线分隔 ── */
    .divider {
      width: clamp(50px, 10vw, 100px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 1.5rem;
      opacity: 0;
      animation: fadeIn 1s ease 2s forwards;
    }

    /* ── 打字机副标题 ── */
    .subtitle {
      font-family: 'Noto Serif SC', serif;
      font-weight: 300;
      font-size: clamp(0.8rem, 1.8vw, 1rem);
      line-height: 1.8;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.15em;
      max-width: 520px;
      opacity: 0;
      animation: fadeIn 1s ease 2.3s forwards;
      min-height: 2.5em;
    }
    .typewriter-cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--gold);
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── 进入按钮 ── */
    .enter-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin-top: 0;
      width: clamp(200px, 20vw, 260px);
      height: clamp(48px, 6vh, 56px);
      padding: 0;
      border: 1px solid var(--gold);
      background: rgba(201, 168, 76, 0.05);
      color: var(--gold-light);
      font-family: 'Noto Serif SC', serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      cursor: none;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeSlideUp 1s ease 3s forwards;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-decoration: none;
      box-shadow: 0 0 15px rgba(201, 168, 76, 0.12);
    }
    .enter-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }
    .enter-btn:hover::before {
      transform: translateX(100%);
    }
    .enter-btn:hover {
      border-color: var(--gold-light);
      color: #fff;
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 50px rgba(201, 168, 76, 0.4), 0 0 30px rgba(201, 168, 76, 0.2);
      background: rgba(201, 168, 76, 0.15);
    }
    .btn-arrow {
      font-size: 1.2rem;
      transition: transform 0.3s;
    }
    .enter-btn:hover .btn-arrow {
      transform: translateX(8px);
    }

    /* ── 测评入口容器 ── */
    .evaluation-entries {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 1.5rem; /* 调整间距，使入口抬升到登录位置下方 */
      opacity: 0;
      animation: fadeSlideUp 1s ease 3.2s forwards;
      perspective: 1000px;
    }
    .evaluation-entries.more-entries {
      margin-top: 1rem;
      margin-bottom: 2rem;
      animation-delay: 3.4s;
    }

    /* ── 底部标签 ── */
    .footer-tags {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 2.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      font-weight: 200;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1.5s ease 3.5s forwards;
    }
    .footer-tags span::before {
      content: '·';
      margin-right: 1rem;
      color: var(--gold-dark);
    }

    /* ── 侧边光线 ── */
    .side-light {
      position: fixed;
      top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent 0%, rgba(201,168,76,0.3) 30%, rgba(201,168,76,0.6) 50%, rgba(201,168,76,0.3) 70%, transparent 100%);
      z-index: 2;
      opacity: 0;
      animation: fadeIn 2s ease 1s forwards;
    }
    .side-light-left { left: 5vw; }
    .side-light-right { right: 5vw; }

    /* ── 角落纹饰 ── */
    .corner {
      position: fixed;
      width: 60px; height: 60px;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1.5s ease 1s forwards;
    }
    .corner svg { width: 100%; height: 100%; }
    .corner-tl { top: 2rem; left: 2rem; }
    .corner-tr { top: 2rem; right: 2rem; transform: scaleX(-1); }
    .corner-bl { bottom: 2rem; left: 2rem; transform: scaleY(-1); }
    .corner-br { bottom: 2rem; right: 2rem; transform: scale(-1); }

    /* ── 通用动画 ── */
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeScale {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── 响应式 ── */
    @media (max-width: 600px) {
      .side-light, .corner, .footer-tags { display: none; }
      .title-zh { font-size: clamp(3rem, 15vw, 5rem); }
      .evaluation-entries {
        flex-direction: column;
        gap: 15px !important;
        align-items: center;
      }
      .enter-btn {
        width: 240px;
      }
    }
  </style>
</head>
<body>

  <!-- 光标 -->
  <div id="cursor"></div>
  <div id="cursor-trail"></div>

  <!-- 星空画布 -->
  <canvas id="starfield"></canvas>

  <!-- 背景光晕 -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <!-- 鲸鱼背景 -->
  <div class="whale-bg">
    <div class="whale-img"></div>
  </div>

  <!-- 侧边光线 -->
  <div class="side-light side-light-left"></div>
  <div class="side-light side-light-right"></div>

  <!-- 角落纹饰 -->
  <div class="corner corner-tl">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 58 L2 2 L58 2" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
      <path d="M2 30 L12 2" stroke="rgba(201,168,76,0.3)" stroke-width="0.5"/>
      <circle cx="2" cy="2" r="3" fill="rgba(201,168,76,0.6)"/>
    </svg>
  </div>
  <div class="corner corner-tr">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 58 L2 2 L58 2" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
      <path d="M2 30 L12 2" stroke="rgba(201,168,76,0.3)" stroke-width="0.5"/>
      <circle cx="2" cy="2" r="3" fill="rgba(201,168,76,0.6)"/>
    </svg>
  </div>
  <div class="corner corner-bl">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 58 L2 2 L58 2" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
      <path d="M2 30 L12 2" stroke="rgba(201,168,76,0.3)" stroke-width="0.5"/>
      <circle cx="2" cy="2" r="3" fill="rgba(201,168,76,0.6)"/>
    </svg>
  </div>
  <div class="corner corner-br">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 58 L2 2 L58 2" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
      <path d="M2 30 L12 2" stroke="rgba(201,168,76,0.3)" stroke-width="0.5"/>
      <circle cx="2" cy="2" r="3" fill="rgba(201,168,76,0.6)"/>
    </svg>
  </div>

  <!-- 登录状态 -->
  <div id="auth-status"></div>

  <!-- 主内容 -->
  <main id="main">
    <!-- 神圣符文环 -->
    <div class="rune-ring-wrapper" id="runeRing">
      <div class="rune-ring"></div>
      <div class="rune-dots" id="runeDots"></div>
      <div class="rune-inner">
        <div class="rune-eye">
          <!-- 第三只眼 SVG -->
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 外眼轮廓 -->
            <path d="M10 50 Q50 10 90 50 Q50 90 10 50 Z" stroke="rgba(201,168,76,0.9)" stroke-width="1.5" fill="none"/>
            <!-- 虹膜 -->
            <circle cx="50" cy="50" r="18" stroke="rgba(201,168,76,0.7)" stroke-width="1" fill="none"/>
            <!-- 瞳孔 -->
            <circle cx="50" cy="50" r="8" fill="rgba(201,168,76,0.9)">
              <animate attributeName="r" values="8;10;8" dur="3s" repeatCount="indefinite"/>
              <animate attributeName="fill-opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
            </circle>
            <!-- 光芒 -->
            <line x1="50" y1="25" x2="50" y2="18" stroke="rgba(201,168,76,0.5)" stroke-width="0.8">
              <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
            </line>
            <line x1="50" y1="75" x2="50" y2="82" stroke="rgba(201,168,76,0.5)" stroke-width="0.8">
              <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" begin="0.5s" repeatCount="indefinite"/>
            </line>
            <line x1="28" y1="28" x2="23" y2="23" stroke="rgba(201,168,76,0.4)" stroke-width="0.8"/>
            <line x1="72" y1="28" x2="77" y2="23" stroke="rgba(201,168,76,0.4)" stroke-width="0.8"/>
            <line x1="28" y1="72" x2="23" y2="77" stroke="rgba(201,168,76,0.4)" stroke-width="0.8"/>
            <line x1="72" y1="72" x2="77" y2="77" stroke="rgba(201,168,76,0.4)" stroke-width="0.8"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- 主标题 -->
    <h1 class="title-zh">觉 醒 诗 社</h1>
    <p class="title-en">A W A K E N I N G · P O E T R Y</p>

    <!-- 分隔线 -->
    <div class="divider"></div>

    <!-- 打字机副标题 -->
    <p class="subtitle" id="subtitle">
      <span id="typeText"></span><span class="typewriter-cursor" id="typeCursor"></span>
    </p>

    <!-- 登录欢迎入口 -->
    <div id="home-greeting" class="home-auth-welcome show">
      你好，<span class="home-auth-login-trigger" onclick="openAuthModal()">登录</span>
    </div>

    <!-- 测评入口 -->
    <div class="evaluation-entries">
      <a href="SoulLab/index.html" class="enter-btn">
        灵性人格测试
        <span class="btn-arrow">→</span>
      </a>
      <a href="ObjTest/index.html" class="enter-btn">
        自我客体化测评
        <span class="btn-arrow">→</span>
      </a>
    </div>

    <!-- 更多入口 -->
    <div class="evaluation-entries more-entries">
      <a href="https://ncnra455tpou.feishu.cn/wiki/R4y5wdFngiviwWkz1uQcYSDInmh" target="_blank" class="enter-btn">
        觉醒智库
        <span class="btn-arrow">→</span>
      </a>
      <a href="Snow/index.html" class="enter-btn">
        在线赏雪
        <span class="btn-arrow">→</span>
      </a>
    </div>
  </main>

  <script>
    /* ────────────────────────────────
       1. 自定义光标
    ──────────────────────────────── */
    const cursor = document.getElementById('cursor');
    const trail = document.getElementById('cursor-trail');
    let mx = 0, my = 0, tx = 0, ty = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.transform = `translate(${mx}px, ${my}px) translate(-50%, -50%)`;
    });

    (function animTrail() {
      tx += (mx - tx) * 0.12;
      ty += (my - ty) *.12;
      trail.style.transform = `translate(${tx}px, ${ty}px) translate(-50%, -50%)`;
      requestAnimationFrame(animTrail);
    })();

    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.style.transform = `translate(${mx}px, ${my}px) translate(-50%, -50%) scale(2)`;
        cursor.style.opacity = '0.6';
      });
      el.addEventListener('mouseleave', () => {
        cursor.style.transform = `translate(${mx}px, ${my}px) translate(-50%, -50%) scale(1)`;
        cursor.style.opacity = '1';
      });
    });

    /* ────────────────────────────────
       2. 星空粒子
    ──────────────────────────────── */
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const STARS = 280;
    const stars = Array.from({ length: STARS }, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 1.5 + 0.2,
      speed: Math.random() * 0.15 + 0.03,
      alpha: Math.random() * 0.7 + 0.1,
      twinkleSpeed: Math.random() * 0.015 + 0.005,
      twinkleDir: Math.random() > 0.5 ? 1 : -1,
      gold: Math.random() < 0.12
    }));

    // 流星
    const METEORS = 3;
    const meteors = Array.from({ length: METEORS }, () => newMeteor());
    function newMeteor() {
      return {
        x: Math.random() * window.innerWidth * 0.7,
        y: Math.random() * window.innerHeight * 0.4,
        len: Math.random() * 160 + 80,
        speed: Math.random() * 4 + 2,
        alpha: 0,
        life: 0,
        maxLife: Math.random() * 80 + 40,
        delay: Math.random() * 300
      };
    }

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      stars.forEach(s => {
        s.alpha += s.twinkleSpeed * s.twinkleDir;
        if (s.alpha >= 0.85 || s.alpha <= 0.1) s.twinkleDir *= -1;

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        if (s.gold) {
          ctx.fillStyle = `rgba(201,168,76,${s.alpha})`;
        } else {
          ctx.fillStyle = `rgba(220,220,255,${s.alpha * 0.8})`;
        }
        ctx.fill();
      });

      // 流星
      meteors.forEach((m, i) => {
        if (m.delay > 0) { m.delay--; return; }
        m.life++;
        m.alpha = m.life < 10 ? m.life / 10 : (m.life > m.maxLife - 10 ? (m.maxLife - m.life) / 10 : 1);
        m.x += m.speed * 1.5;
        m.y += m.speed;

        const grad = ctx.createLinearGradient(m.x, m.y, m.x - m.len, m.y - m.len * 0.67);
        grad.addColorStop(0, `rgba(240,208,128,${m.alpha * 0.9})`);
        grad.addColorStop(1, 'rgba(240,208,128,0)');
        ctx.beginPath();
        ctx.moveTo(m.x, m.y);
        ctx.lineTo(m.x - m.len, m.y - m.len * 0.67);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        if (m.life >= m.maxLife || m.x > canvas.width || m.y > canvas.height) {
          meteors[i] = newMeteor();
          meteors[i].delay = Math.random() * 200 + 100;
        }
      });

      requestAnimationFrame(drawStars);
    }
    drawStars();

    /* ────────────────────────────────
       3. 符文环上的旋转点
    ──────────────────────────────── */
    const dotsContainer = document.getElementById('runeDots');
    const dotCount = 12;
    const ring = document.getElementById('runeRing');

    function placeDots() {
      dotsContainer.innerHTML = '';
      const size = ring.offsetWidth;
      const radius = size / 2 - 4;
      for (let i = 0; i < dotCount; i++) {
        const angle = (i / dotCount) * 2 * Math.PI;
        const dot = document.createElement('div');
        dot.className = 'rune-dot';
        const x = 50 + (radius / size * 100 - 0.5) * Math.cos(angle);
        const y = 50 + (radius / size * 100 - 0.5) * Math.sin(angle);
        dot.style.cssText = `
          left: ${x}%;
          top: ${y}%;
          transform: translate(-50%, -50%) rotate(${angle}rad);
          opacity: ${i % 3 === 0 ? 1 : i % 3 === 1 ? 0.5 : 0.2};
          width: ${i % 4 === 0 ? '6px' : '3px'};
          height: ${i % 4 === 0 ? '6px' : '3px'};
        `;
        dotsContainer.appendChild(dot);
      }
    }
    placeDots();

    // 让点旋转
    let dotAngle = 0;
    (function rotateDots() {
      dotAngle += 0.005;
      const size = ring.offsetWidth;
      const radius = size / 2 - 4;
      const dots = dotsContainer.querySelectorAll('.rune-dot');
      dots.forEach((dot, i) => {
        const angle = (i / dotCount) * 2 * Math.PI + dotAngle;
        const x = 50 + (radius / size * 100 - 0.5) * Math.cos(angle);
        const y = 50 + (radius / size * 100 - 0.5) * Math.sin(angle);
        dot.style.left = x + '%';
        dot.style.top = y + '%';
      });
      requestAnimationFrame(rotateDots);
    })();

    /* ────────────────────────────────
       4. 打字机效果
    ──────────────────────────────── */
    const lines = [
      '认识生命真相，活出觉醒人生',
      '在你醒来之前，你从未真正活过',
      '当死亡降临时，我们才如梦方醒',
      '真实的永远不会消失，虚假的从来都不存在'
    ];
    const typeEl = document.getElementById('typeText');
    let lineIndex = 0, charIndex = 0, isDeleting = false;
    let typeStarted = false;

    function typeWriter() {
      const current = lines[lineIndex];
      if (!isDeleting) {
        typeEl.textContent = current.slice(0, ++charIndex);
        if (charIndex === current.length) {
          isDeleting = true;
          setTimeout(typeWriter, 2200);
          return;
        }
      } else {
        typeEl.textContent = current.slice(0, --charIndex);
        if (charIndex === 0) {
          isDeleting = false;
          lineIndex = (lineIndex + 1) % lines.length;
        }
      }
      setTimeout(typeWriter, isDeleting ? 45 : 100);
    }

    // 动画完成后开始打字
    setTimeout(() => typeWriter(), 2600);

    /* ────────────────────────────────
       5. 按钮光波点击特效
    ──────────────────────────────── */
    document.querySelectorAll('.enter-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        const ripple = document.createElement('span');
        const rect = this.getBoundingClientRect();
        ripple.style.cssText = `
          position:absolute;
          width:300px;height:300px;
          left:${e.clientX - rect.left - 150}px;
          top:${e.clientY - rect.top - 150}px;
          background:rgba(201,168,76,0.2);
          border-radius:50%;
          transform:scale(0);
          animation:rippleAnim 0.8s ease-out forwards;
          pointer-events:none;
        `;
        const style = document.createElement('style');
        style.textContent = `@keyframes rippleAnim{to{transform:scale(1);opacity:0}}`;
        document.head.appendChild(style);
        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 800);
      });
    });

    /* ────────────────────────────────
       6. 鼠标视差
    ──────────────────────────────── */
    document.addEventListener('mousemove', e => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const dx = (e.clientX - cx) / cx;
      const dy = (e.clientY - cy) / cy;
      document.querySelector('.rune-ring-wrapper').style.transform =
        `translate(${dx * 8}px, ${dy * 8}px) scale(1)`;
      document.querySelector('.title-zh').style.textShadow =
        `${dx * 10}px ${dy * 10}px 40px rgba(201,168,76,0.3)`;
      
    // 鲸鱼视差效果
      document.querySelector('.whale-img').style.transform = 
        `translate(${dx * -15}px, ${dy * -10}px) scale(1.02)`;
    });
  </script>
