<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>觉醒诗社 · 管理后台</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a1a;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --accent: #a78bfa;
      --danger: #f87171;
      --text: rgba(255,255,255,0.85);
      --text-dim: rgba(255,255,255,0.45);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .admin-header {
      padding: 20px 30px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .admin-header .admin-actions {
      display: flex; gap: 10px; align-items: center;
    }
    .admin-header button, .admin-header a {
      padding: 6px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      text-decoration: none;
      transition: all 0.2s;
    }
    .admin-header button:hover, .admin-header a:hover {
      border-color: var(--accent);
    }
    .admin-login {
      max-width: 360px;
      margin: 100px auto;
      padding: 40px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-align: center;
    }
    .admin-login h2 { margin-bottom: 24px; font-size: 1.2rem; }
    .admin-login input {
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 12px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: white;
      font-size: 0.9rem;
      outline: none;
    }
    .admin-login input:focus { border-color: var(--accent); }
    .admin-login button {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #a78bfa, #6366f1);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .admin-login .error { color: var(--danger); font-size: 0.82rem; margin-top: 8px; }
    .admin-login .tip {
      margin-top: 12px;
      color: var(--text-dim);
      font-size: 0.78rem;
      line-height: 1.6;
      text-align: left;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .admin-body { padding: 24px 30px; max-width: 1180px; margin: 0 auto; }
    .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--card); border-radius: 10px; padding: 4px; }
    .tabs button {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 0.9rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tabs button.active { background: rgba(167,139,250,0.2); color: white; font-weight: 600; }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      text-align: center;
    }
    .stat-card .stat-num { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-card .stat-label { font-size: 0.78rem; color: var(--text-dim); margin-top: 4px; }
    .status-panel {
      margin-bottom: 18px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(167,139,250,0.14), rgba(255,255,255,0.03));
      color: rgba(255,255,255,0.78);
      font-size: 0.82rem;
      line-height: 1.7;
    }
    .tool-row {
      display: grid;
      grid-template-columns: 1.6fr repeat(2, minmax(130px, 1fr)) auto;
      gap: 10px;
      margin-bottom: 14px;
      align-items: center;
    }
    .tool-row.users {
      grid-template-columns: 1fr auto;
    }
    .tool-row input, .tool-row select {
      width: 100%;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 0 10px;
      outline: none;
      font-size: 0.82rem;
    }
    .tool-row input:focus, .tool-row select:focus {
      border-color: var(--accent);
    }
    .tool-row button {
      height: 36px;
      padding: 0 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 0.82rem;
    }
    .tool-row button:hover { border-color: var(--accent); }
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: auto;
      background: rgba(255,255,255,0.02);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
      min-width: 860px;
    }
    th, td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th { color: var(--text-dim); font-weight: 500; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .btn-sm {
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      transition: all 0.2s;
    }
    .btn-danger { border-color: rgba(248,113,113,0.3); color: var(--danger); }
    .btn-danger:hover { background: rgba(248,113,113,0.15); }
    .btn-warn { border-color: rgba(251,191,36,0.3); color: #fbbf24; }
    .btn-warn:hover { background: rgba(251,191,36,0.1); }
    .comment-img-thumb { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; cursor: pointer; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.74rem;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
    }
    .avatar-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      font-size: 18px;
      object-fit: cover;
    }
    .cell-user {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .empty { text-align: center; padding: 40px; color: var(--text-dim); }
    #admin-app { display: none; }
    @media (max-width: 640px) {
      .admin-body { padding: 16px; }
      .tool-row { grid-template-columns: 1fr; }
      .tool-row.users { grid-template-columns: 1fr; }
      table { font-size: 0.8rem; min-width: 680px; }
      th, td { padding: 8px 6px; }
    }
  </style>
</head>
<body>
  <!-- 登录页 -->
  <div id="admin-login" class="admin-login">
    <h2>🔐 管理后台登录</h2>
    <input type="email" id="login-email" placeholder="管理员邮箱" autocomplete="email">
    <input type="password" id="login-password" placeholder="密码" autocomplete="current-password">
    <button onclick="adminLogin()">登录</button>
    <p class="error" id="login-error"></p>
    <p class="tip">管理员登录条件：邮箱已验证，且 `profiles.is_admin=true` 或用户 metadata 含 `is_admin=true`。</p>
  </div>

  <!-- 管理主体 -->
  <div id="admin-app">
    <div class="admin-header">
      <h1>觉醒诗社 · 管理后台</h1>
      <div class="admin-actions">
        <a href="../index.html">← 返回前台</a>
        <button onclick="adminLogout()">退出</button>
      </div>
    </div>

    <div class="admin-body">
      <div class="stats" id="stats"></div>
      <div class="status-panel" id="status-panel">系统状态加载中...</div>

      <div class="tabs">
        <button class="active" onclick="switchTab('comments', this)">评论管理</button>
        <button onclick="switchTab('users', this)">用户管理</button>
      </div>

      <div id="comments-toolbar" class="tool-row">
        <input id="comment-search" placeholder="搜索评论内容或昵称（实时过滤）" oninput="renderComments()">
        <select id="comment-page-filter" onchange="renderComments()">
          <option value="all">全部来源</option>
          <option value="soullab">灵性测试</option>
          <option value="objtest">客体化测评</option>
        </select>
        <select id="comment-status-filter" onchange="renderComments()">
          <option value="all">全部状态</option>
          <option value="visible">仅正常</option>
          <option value="hidden">仅隐藏</option>
        </select>
        <button onclick="loadComments()">刷新评论</button>
      </div>

      <div id="users-toolbar" class="tool-row users" style="display:none">
        <input id="user-search" placeholder="搜索昵称 / 角色 / 注册日期" oninput="renderUsers()">
        <button onclick="loadUsers()">刷新用户</button>
      </div>

      <div id="tab-comments"></div>
      <div id="tab-users" style="display:none"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase 客户端初始化（使用 db 避免变量提升问题）
    window.db = window.supabase.createClient(
      'https://xcwdgwvtgbqcsslbgtpy.supabase.co',
      'sb_publishable_g5USxyN0qcqv9peaZE_irQ_B3QIPV_H'
    );

    var adminUser = null;
    var commentCache = [];
    var userCache = [];

    function hashSeed(input) {
      const text = String(input || '');
      let hash = 0;
      for (let i = 0; i < text.length; i++) {
        hash = (hash << 5) - hash + text.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash);
    }

    function pickEmoji(seed) {
      const emojis = ['🙂', '😎', '🤖', '🦊', '🐼', '🦄', '🍀', '🌙', '🔥', '✨', '🎭', '🧠'];
      return emojis[hashSeed(seed) % emojis.length];
    }

    function renderAdminAvatar(avatarValue, seed) {
      if (typeof avatarValue === 'string' && avatarValue.startsWith('emoji:')) {
        return `<span class="avatar-dot">${escapeH(avatarValue.slice(6) || pickEmoji(seed))}</span>`;
      }
      if (typeof avatarValue === 'string' && /^(https?:\/\/|data:image\/)/.test(avatarValue) && !avatarValue.includes('api.dicebear.com')) {
        return `<img class="avatar-dot" src="${escapeAttr(avatarValue)}" alt="">`;
      }
      return `<span class="avatar-dot">${pickEmoji(seed)}</span>`;
    }

    function getAdminAvatarValue(profile) {
      if (!profile || typeof profile !== 'object') return '';
      if (typeof profile.avatar_url === 'string' && profile.avatar_url) return profile.avatar_url;
      if (typeof profile.avatar === 'string' && profile.avatar) return profile.avatar;
      if (typeof profile.avatar_emoji === 'string' && profile.avatar_emoji) return `emoji:${profile.avatar_emoji}`;
      return '';
    }

    function hasAdminMetadata(user) {
      return Boolean(
        user?.app_metadata?.role === 'admin' ||
        user?.app_metadata?.is_admin === true ||
        user?.user_metadata?.is_admin === true
      );
    }

    async function getProfileAdminState(user) {
      if (!user?.id) return false;

      // 兜底：确保 profile 存在，避免历史账号因缺 profile 导致“看起来无法登录”
      await db.from('profiles').upsert({
        id: user.id,
        nickname: user.user_metadata?.nickname || '管理员'
      });

      const { data: profile } = await db
        .from('profiles')
        .select('is_admin')
        .eq('id', user.id)
        .maybeSingle();

      return profile?.is_admin === true;
    }

    /* ── 登录 ── */
    async function adminLogin() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      errorEl.textContent = '';

      const { data, error } = await db.auth.signInWithPassword({ email, password });
      if (error) {
        if (error.message?.includes('Email not confirmed')) {
          errorEl.textContent = '登录失败：邮箱未验证，请先到邮箱完成验证。';
        } else if (error.message?.includes('Invalid API key')) {
          errorEl.textContent = '登录失败：站点认证配置异常（Supabase Key 无效）。';
        } else if (error.message?.includes('Invalid login')) {
          errorEl.textContent = '登录失败：邮箱或密码错误。';
        } else {
          errorEl.textContent = '登录失败：' + error.message;
        }
        return;
      }

      // 检查是否为管理员：优先 profiles.is_admin，其次 auth app/user metadata
      const isAdmin = await getProfileAdminState(data.user) || hasAdminMetadata(data.user);
      if (!isAdmin) {
        errorEl.textContent = '你不是管理员';
        await db.auth.signOut();
        return;
      }

      adminUser = data.user;
      document.getElementById('admin-login').style.display = 'none';
      document.getElementById('admin-app').style.display = 'block';
      loadDashboard();
    }

    async function adminLogout() {
      await db.auth.signOut();
      location.reload();
    }

    /* ── 检查已有 session ── */
    async function checkSession() {
      const { data: { session } } = await db.auth.getSession();
      if (!session) return;
      const isAdmin = await getProfileAdminState(session.user) || hasAdminMetadata(session.user);
      if (isAdmin) {
        adminUser = session.user;
        document.getElementById('admin-login').style.display = 'none';
        document.getElementById('admin-app').style.display = 'block';
        loadDashboard();
      }
    }
    checkSession();

    /* ── Dashboard ── */
    async function loadDashboard() {
      await loadStats();
      await loadComments();
      await loadUsers();
    }

    async function loadStats() {
      const { count: userCount } = await db.from('profiles').select('*', { count: 'exact', head: true });
      const { count: commentCount } = await db.from('comments').select('*', { count: 'exact', head: true });
      const { count: soullabCount } = await db.from('comments').select('*', { count: 'exact', head: true }).eq('page_type', 'soullab');
      const { count: objCount } = await db.from('comments').select('*', { count: 'exact', head: true }).eq('page_type', 'objtest');
      const { count: hiddenCount } = await db.from('comments').select('*', { count: 'exact', head: true }).eq('is_hidden', true);
      const { count: adminCount } = await db.from('profiles').select('*', { count: 'exact', head: true }).eq('is_admin', true);

      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="stat-num">${userCount || 0}</div><div class="stat-label">注册用户</div></div>
        <div class="stat-card"><div class="stat-num">${commentCount || 0}</div><div class="stat-label">总评论数</div></div>
        <div class="stat-card"><div class="stat-num">${soullabCount || 0}</div><div class="stat-label">灵性测试评论</div></div>
        <div class="stat-card"><div class="stat-num">${objCount || 0}</div><div class="stat-label">客体化评论</div></div>
        <div class="stat-card"><div class="stat-num">${hiddenCount || 0}</div><div class="stat-label">已隐藏评论</div></div>
        <div class="stat-card"><div class="stat-num">${adminCount || 0}</div><div class="stat-label">管理员</div></div>
      `;

      const statusEl = document.getElementById('status-panel');
      if (statusEl) {
        statusEl.innerHTML = `
          当前登录：<strong>${escapeH(adminUser?.email || '未知')}</strong> ｜ 
          管理权限来源：<strong>profiles.is_admin / auth metadata 双通道</strong> ｜ 
          数据刷新时间：<strong>${new Date().toLocaleString('zh-CN')}</strong>
        `;
      }
    }

    /* ── 评论管理 ── */
    async function loadComments() {
      const { data: comments } = await db
        .from('comments')
        .select('*, profiles(*)')
        .order('created_at', { ascending: false })
        .limit(300);

      commentCache = comments || [];
      renderComments();
    }

    function renderComments() {
      const container = document.getElementById('tab-comments');
      const search = (document.getElementById('comment-search')?.value || '').trim().toLowerCase();
      const pageFilter = document.getElementById('comment-page-filter')?.value || 'all';
      const statusFilter = document.getElementById('comment-status-filter')?.value || 'all';

      let rows = (commentCache || []).filter(c => {
        const nickname = (c.profiles?.nickname || '').toLowerCase();
        const content = (c.content || '').toLowerCase();
        const matchSearch = !search || nickname.includes(search) || content.includes(search);
        const matchPage = pageFilter === 'all' || c.page_type === pageFilter;
        const matchStatus =
          statusFilter === 'all' ||
          (statusFilter === 'hidden' && c.is_hidden) ||
          (statusFilter === 'visible' && !c.is_hidden);
        return matchSearch && matchPage && matchStatus;
      });

      if (rows.length === 0) {
        container.innerHTML = '<p class="empty">没有匹配的评论</p>';
        return;
      }

      container.innerHTML = `<div class="table-wrap"><table>
        <thead><tr><th>用户</th><th>来源</th><th>内容</th><th>图片</th><th>时间</th><th>状态</th><th>操作</th></tr></thead>
        <tbody>${rows.map(c => `
          <tr id="row-${c.id}" style="${c.is_hidden ? 'opacity:0.4' : ''}">
            <td>
              <span class="cell-user">
                ${renderAdminAvatar(getAdminAvatarValue(c.profiles), c.user_id)}
                <span>${escapeH(c.profiles?.nickname || '未知')}</span>
              </span>
            </td>
            <td><span class="badge">${c.page_type === 'soullab' ? '灵性测试' : '客体化'}</span></td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeH(c.content || '')}</td>
            <td>${c.image_url ? `<img class="comment-img-thumb" src="${escapeAttr(c.image_url)}" onclick="window.open(this.src)">` : '-'}</td>
            <td style="white-space:nowrap">${new Date(c.created_at).toLocaleString('zh-CN', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</td>
            <td>${c.is_hidden ? '<span class="badge">🚫 已隐藏</span>' : '<span class="badge">✅ 正常</span>'}</td>
            <td>
              <button class="btn-sm btn-warn" onclick="toggleHide('${c.id}', ${!c.is_hidden})">${c.is_hidden ? '恢复' : '隐藏'}</button>
              <button class="btn-sm btn-danger" onclick="deleteC('${c.id}')">删除</button>
            </td>
          </tr>
        `).join('')}</tbody>
      </table></div>`;
    }

    async function toggleHide(id, hide) {
      await db.from('comments').update({ is_hidden: hide }).eq('id', id);
      loadComments();
      loadStats();
    }

    async function deleteC(id) {
      if (!confirm('确定永久删除？')) return;
      await db.from('comments').delete().eq('id', id);
      loadComments();
      loadStats();
    }

    /* ── 用户管理 ── */
    async function loadUsers() {
      const { data: users } = await db
        .from('profiles')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(300);

      userCache = users || [];
      renderUsers();
    }

    function renderUsers() {
      const container = document.getElementById('tab-users');
      const search = (document.getElementById('user-search')?.value || '').trim().toLowerCase();
      const rows = (userCache || []).filter(u => {
        const line = `${u.nickname || ''} ${u.is_admin ? '管理员' : '普通用户'} ${new Date(u.created_at).toLocaleDateString('zh-CN')}`.toLowerCase();
        return !search || line.includes(search);
      });

      if (rows.length === 0) {
        container.innerHTML = '<p class="empty">没有匹配的用户</p>';
        return;
      }

      container.innerHTML = `<div class="table-wrap"><table>
        <thead><tr><th>头像</th><th>昵称</th><th>角色</th><th>注册时间</th><th>操作</th></tr></thead>
        <tbody>${rows.map(u => `
          <tr>
            <td>${renderAdminAvatar(getAdminAvatarValue(u), u.id)}</td>
            <td>${escapeH(u.nickname || '')}</td>
            <td>${u.is_admin ? '<span class="badge">👑 管理员</span>' : '<span class="badge">普通用户</span>'}</td>
            <td>${new Date(u.created_at).toLocaleDateString('zh-CN')}</td>
            <td>
              <button class="btn-sm" onclick="toggleAdmin('${u.id}', ${!u.is_admin})">${u.is_admin ? '取消管理员' : '设为管理员'}</button>
            </td>
          </tr>
        `).join('')}</tbody>
      </table></div>`;
    }

    async function toggleAdmin(id, makeAdmin) {
      await db.from('profiles').update({ is_admin: makeAdmin }).eq('id', id);
      loadUsers();
    }

    /* ── Tab 切换 ── */
    function switchTab(tab, btn) {
      document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-comments').style.display = tab === 'comments' ? 'block' : 'none';
      document.getElementById('tab-users').style.display = tab === 'users' ? 'block' : 'none';
      document.getElementById('comments-toolbar').style.display = tab === 'comments' ? 'grid' : 'none';
      document.getElementById('users-toolbar').style.display = tab === 'users' ? 'grid' : 'none';
    }

    function escapeH(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function escapeAttr(v) {
      return String(v || '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
