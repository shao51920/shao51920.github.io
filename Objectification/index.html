<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自我客体化测评 - 探索真实的自己</title>
  <meta name="description" content="评估你在多大程度上将自己客体化（把自己当作工具、物品或他人实现目的的手段）。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="landing-active">
  <!-- 背景动画 -->
  <div class="bg-gradient"></div>

  <!-- 返回主页按钮 -->
  <a href="../index.html" class="nav-home-btn" id="globalHomeBtn" title="返回主页">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
      <polyline points="9 22 9 12 15 12 15 22" />
    </svg>
  </a>


  <!-- 开始页 -->
  <section id="landing" class="page active">
    <div class="landing-content card-bg">
      <h1 class="title-main">自我客体化测评</h1>
      <p class="subtitle">评估你在多大程度上将自己当作物品或工具</p>

      <div class="scoring-box">
        <h3>计分说明</h3>
        <ul>
          <li>一共40道题，每题根据选项获得相应分数</li>
          <li>总分范围：0-120分</li>
          <li>分数越高，自我客体化程度越严重</li>
          <li>完成后显示评估结果</li>
        </ul>
      </div>

      <button id="start-btn" class="btn-primary" onclick="startTest()">
        开始探索
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7" />
        </svg>
      </button>

      <p class="disclaimer">本测评可作为自我探索之用，不能替代专业诊断。</p>
    </div>
  </section>

  <!-- 测试页 -->
  <section id="quiz" class="page">
    <div class="quiz-header">
      <div class="progress-text">进度：<span id="current-q">1</span> / <span id="total-q">40</span></div>
      <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <div class="quiz-body">
      <div class="question-container" id="question-container">
        <h2 class="question-number" id="q-number">第 1 题</h2>
        <p class="question-text" id="q-text"></p>
        <div class="options" id="options-container"></div>
      </div>
    </div>

    <div class="quiz-footer">
      <a href="../index.html" class="btn-home-global" title="返回主页">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
      </a>
      <button class="btn-secondary" id="prev-btn" onclick="prevQuestion()" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
        上一题
      </button>
      <button class="btn-primary" id="next-btn" onclick="nextQuestion()" disabled>
        下一题
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7" />
        </svg>
      </button>
    </div>
  </section>

  <!-- 加载页 -->
  <section id="loading" class="page">
    <div class="loading-content card-bg">
      <div class="spinner"></div>
      <h2 class="loading-text">正在评估您的状态...</h2>
      <p class="loading-sub" id="loading-sub">分析内在边界</p>
    </div>
  </section>

  <!-- 结果页 -->
  <section id="result" class="page">
    <div class="result-content card-bg" id="capture-area">
      <h2 class="result-header-title">客体化程度测评结果</h2>
      <div class="result-badge" id="result-badge">🌱</div>
      <h1 class="result-score">总分：<span id="score-value">0</span></h1>
      <h2 class="result-title" id="result-title"></h2>

      <div class="result-box">
        <h3>主要特征</h3>
        <p id="result-description"></p>
      </div>

      <div class="result-box">
        <h3>心理状态</h3>
        <p id="result-psych"></p>
      </div>

      <div class="result-box advice-box">
        <h3>建议与行动</h3>
        <p id="result-advice"></p>
      </div>

      <div class="result-actions">
        <button class="btn-primary" onclick="saveResult()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          保存结果
        </button>
        <button class="btn-primary" onclick="restartTest()">重新测评</button>
      </div>

      <div class="share-credit-box">
        <div class="author-info-group">
          <p>作者：<span class="author-name">青野</span></p>
          <p>公众号：<span class="author-name">觉醒诗社</span></p>
        </div>
        <div class="qrcode-container-fixed">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://qingye520.xyz/%E5%AD%90%E9%A1%B5%E9%9D%A2/%E5%AE%A2%E4%BD%93%E5%8C%96%E6%B5%8B%E8%AF%95/" alt="测评二维码" />
          <p>扫码测评</p>
        </div>
      </div>
    </div>
  </section>

  <script src="questions.js"></script>
  <script src="results.js"></script>
  <script src="app.js"></script>
</body>

</html>
